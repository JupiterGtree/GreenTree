server { listen 80; listen [::]:80; server_name gtree.land www.gtree.land; location /.well-known/acme-challenge/ { root /var/www/greentree/acme; } location / { return 301 https://gtree.land$request_uri; } }
server { listen 443 ssl http2; server_name www.gtree.land; ssl_certificate /etc/letsencrypt/live/gtree.land/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/gtree.land/privkey.pem; return 301 https://gtree.land$request_uri; }
server { listen 443 ssl http2; server_name gtree.land; ssl_certificate /etc/letsencrypt/live/gtree.land/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/gtree.land/privkey.pem; client_max_body_size 2m; add_header X-Content-Type-Options nosniff always; add_header X-Frame-Options SAMEORIGIN always; add_header Referrer-Policy strict-origin-when-cross-origin always;
 location = /assets/token/metadata.json { alias /var/lib/greentree/public/assets/token/metadata.json; default_type application/json; add_header Cache-Control "public, max-age=300"; }
 location = /assets/token/green-tree-token-logo.png { alias /var/lib/greentree/public/assets/token/green-tree-token-logo.png; default_type image/png; add_header Cache-Control "public, max-age=86400"; }
 location ~ ^/(api|admin) { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_no_cache 1; proxy_cache_bypass 1; }
 location / { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }
}
